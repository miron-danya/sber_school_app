<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Погода</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .app {
      width: 100%;
      max-width: 480px;
      background: rgba(255, 255, 255, 0.15);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }

    h1 {
      font-size: 24px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 24px;
      letter-spacing: 0.5px;
    }

    .search {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .search input {
      flex: 1;
      padding: 12px 16px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      outline: none;
    }

    .search input:focus {
      background: #fff;
    }

    .btn {
      padding: 12px 18px;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      transition: transform 0.1s, background 0.2s;
    }

    .btn:hover { background: #fff; }
    .btn:active { transform: scale(0.97); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .geo-btn {
      width: 100%;
      margin-bottom: 24px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .geo-btn:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .status {
      text-align: center;
      padding: 24px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 14px;
    }

    .error {
      background: rgba(255, 80, 80, 0.2);
      border: 1px solid rgba(255, 100, 100, 0.4);
      border-radius: 12px;
      padding: 14px;
      text-align: center;
      font-size: 14px;
    }

    .weather { display: none; }
    .weather.visible { display: block; }

    .city {
      font-size: 22px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 4px;
    }

    .country {
      font-size: 13px;
      text-align: center;
      opacity: 0.7;
      margin-bottom: 20px;
    }

    .main {
      text-align: center;
      margin-bottom: 24px;
    }

    .icon {
      font-size: 72px;
      line-height: 1;
      margin-bottom: 8px;
    }

    .temp {
      font-size: 64px;
      font-weight: 300;
      line-height: 1;
    }

    .temp .unit {
      font-size: 32px;
      vertical-align: top;
      margin-left: 4px;
      opacity: 0.8;
    }

    .description {
      font-size: 16px;
      margin-top: 8px;
      opacity: 0.95;
      text-transform: capitalize;
    }

    .details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-top: 8px;
    }

    .detail {
      background: rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .detail .label {
      font-size: 12px;
      opacity: 0.75;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .detail .value {
      font-size: 18px;
      font-weight: 500;
    }

    .updated {
      text-align: center;
      font-size: 12px;
      opacity: 0.6;
      margin-top: 16px;
    }
  </style>
</head>
<body>
  <div class="app">
    <h1>Погода</h1>

    <form class="search" id="search-form">
      <input
        id="city-input"
        type="text"
        placeholder="Введите город..."
        autocomplete="off"
        required
      />
      <button class="btn" type="submit">Найти</button>
    </form>

    <button class="btn geo-btn" id="geo-btn">Моё местоположение</button>

    <div class="status" id="status">Введите название города или используйте геолокацию.</div>
    <div class="weather" id="weather"></div>
  </div>

  <script>
    const WEATHER_CODES = {
      0:  { icon: "☀️", text: "ясно" },
      1:  { icon: "🌤️", text: "преимущественно ясно" },
      2:  { icon: "⛅", text: "переменная облачность" },
      3:  { icon: "☁️", text: "пасмурно" },
      45: { icon: "🌫️", text: "туман" },
      48: { icon: "🌫️", text: "изморозь" },
      51: { icon: "🌦️", text: "лёгкая морось" },
      53: { icon: "🌦️", text: "морось" },
      55: { icon: "🌧️", text: "сильная морось" },
      56: { icon: "🌧️", text: "ледяная морось" },
      57: { icon: "🌧️", text: "сильная ледяная морось" },
      61: { icon: "🌦️", text: "небольшой дождь" },
      63: { icon: "🌧️", text: "дождь" },
      65: { icon: "🌧️", text: "сильный дождь" },
      66: { icon: "🌧️", text: "ледяной дождь" },
      67: { icon: "🌧️", text: "сильный ледяной дождь" },
      71: { icon: "🌨️", text: "небольшой снег" },
      73: { icon: "❄️", text: "снег" },
      75: { icon: "❄️", text: "сильный снег" },
      77: { icon: "❄️", text: "снежные зёрна" },
      80: { icon: "🌦️", text: "ливень" },
      81: { icon: "🌧️", text: "сильный ливень" },
      82: { icon: "⛈️", text: "очень сильный ливень" },
      85: { icon: "🌨️", text: "снежный ливень" },
      86: { icon: "❄️", text: "сильный снежный ливень" },
      95: { icon: "⛈️", text: "гроза" },
      96: { icon: "⛈️", text: "гроза с градом" },
      99: { icon: "⛈️", text: "сильная гроза с градом" },
    };

    const statusEl = document.getElementById("status");
    const weatherEl = document.getElementById("weather");
    const form = document.getElementById("search-form");
    const cityInput = document.getElementById("city-input");
    const geoBtn = document.getElementById("geo-btn");

    function showStatus(text, isError = false) {
      weatherEl.classList.remove("visible");
      statusEl.style.display = "block";
      statusEl.className = isError ? "error" : "status";
      statusEl.textContent = text;
    }

    function hideStatus() {
      statusEl.style.display = "none";
    }

    async function geocode(name) {
      const url = `https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(name)}&count=1&language=ru&format=json`;
      const res = await fetch(url);
      if (!res.ok) throw new Error("Ошибка геокодинга");
      const data = await res.json();
      if (!data.results || data.results.length === 0) {
        throw new Error("Город не найден");
      }
      return data.results[0];
    }

    async function fetchWeather(lat, lon) {
      const params = new URLSearchParams({
        latitude: lat,
        longitude: lon,
        current: "temperature_2m,apparent_temperature,relative_humidity_2m,weather_code,wind_speed_10m",
        wind_speed_unit: "ms",
        timezone: "auto",
      });
      const res = await fetch(`https://api.open-meteo.com/v1/forecast?${params}`);
      if (!res.ok) throw new Error("Ошибка получения погоды");
      return res.json();
    }

    function render(place, weather) {
      const c = weather.current;
      const code = WEATHER_CODES[c.weather_code] || { icon: "❓", text: "неизвестно" };
      const cityName = place.name || "Ваше местоположение";
      const country = [place.admin1, place.country].filter(Boolean).join(", ");
      const updated = new Date(c.time).toLocaleString("ru-RU", {
        hour: "2-digit",
        minute: "2-digit",
        day: "numeric",
        month: "long",
      });

      weatherEl.innerHTML = `
        <div class="city">${cityName}</div>
        ${country ? `<div class="country">${country}</div>` : ""}
        <div class="main">
          <div class="icon">${code.icon}</div>
          <div class="temp">${Math.round(c.temperature_2m)}<span class="unit">°C</span></div>
          <div class="description">${code.text}</div>
        </div>
        <div class="details">
          <div class="detail">
            <div class="label">Ощущается</div>
            <div class="value">${Math.round(c.apparent_temperature)}°C</div>
          </div>
          <div class="detail">
            <div class="label">Влажность</div>
            <div class="value">${c.relative_humidity_2m}%</div>
          </div>
          <div class="detail">
            <div class="label">Ветер</div>
            <div class="value">${c.wind_speed_10m.toFixed(1)} м/с</div>
          </div>
          <div class="detail">
            <div class="label">Обновлено</div>
            <div class="value" style="font-size: 14px;">${updated}</div>
          </div>
        </div>
      `;

      hideStatus();
      weatherEl.classList.add("visible");
    }

    async function loadByCity(name) {
      showStatus("Ищем город...");
      try {
        const place = await geocode(name);
        showStatus("Загружаем погоду...");
        const weather = await fetchWeather(place.latitude, place.longitude);
        render(place, weather);
      } catch (e) {
        showStatus(e.message, true);
      }
    }

    async function loadByCoords(lat, lon) {
      showStatus("Загружаем погоду...");
      try {
        const weather = await fetchWeather(lat, lon);
        let place = { latitude: lat, longitude: lon, name: "Ваше местоположение" };
        try {
          const r = await fetch(`https://geocoding-api.open-meteo.com/v1/reverse?latitude=${lat}&longitude=${lon}&language=ru&format=json`);
          if (r.ok) {
            const d = await r.json();
            if (d.results && d.results[0]) place = d.results[0];
          }
        } catch (_) {}
        render(place, weather);
      } catch (e) {
        showStatus(e.message, true);
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      const name = cityInput.value.trim();
      if (name) loadByCity(name);
    });

    geoBtn.addEventListener("click", () => {
      if (!navigator.geolocation) {
        showStatus("Геолокация недоступна в этом браузере", true);
        return;
      }
      showStatus("Определяем местоположение...");
      navigator.geolocation.getCurrentPosition(
        (pos) => loadByCoords(pos.coords.latitude, pos.coords.longitude),
        (err) => showStatus("Не удалось получить местоположение: " + err.message, true),
        { timeout: 10000 }
      );
    });
  </script>
</body>
</html>
